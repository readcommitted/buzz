<!doctype html>
<html lang="en">


<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">

  <link rel="manifest" href="manifest.json">

  <link rel="icon" href="favicon.png" sizes="32x32">
  <link rel="icon" href="icon-180.png" sizes="180x180">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="mask-icon" href="icon-192-maskable.png" color="#0ea5a6">

  <meta name="theme-color" content="#111827" />
  <title>Buzzword Ball</title>
  <link href="style.css" rel="stylesheet" type="text/css">
  <script>
    window.BUZZWORD_DATA = {
      order: ["Default", "AI Gibberish", "Consultant Deluxe", "Data Eng", "Sales Speak"],
      packs: {
        "Default": { phrases: ["We need to standardize on the canonical model.", "Let’s right-size the orchestration layer."] },
        "AI Gibberish": { phrases: ["We can’t test the efficacy of the modality.", "Instrument modality-level telemetry end-to-end."] },
        "Consultant Deluxe": { phrases: ["Operationalize the synergies at scale.", "Realign around the strategic fulcrum."] },
        "Data Eng": { phrases: ["Decouple into a pluggable façade.", "Canonicalize entities in the semantic layer."] },
        "Sales Speak": { phrases: ["Drive alignment via outcome-oriented governance.", "De-risk the roadmap with iterative value slices."] }
      }
    };
  </script>
  <script src="app.js"></script>
</head>

<body>
  <main class="app">
    <div class="card" id="card">
      <h1 class="app-title">
        Buzzword Ball
        <span class="tooltip">
          <button class="tooltip__trigger" aria-describedby="buzzword-tip" aria-label="About Buzzword Ball">🔮</button>
          <span class="tooltip__content" role="tooltip" id="buzzword-tip">
            Phrases may sound strategic while meaning nothing.
          </span>
        </span>
      </h1>

      <p class="subtitle">Tap anywhere for satire.</p>
      <p id="phrase" class="phrase"></p>
      <div class="actions">
        <button id="share" class="btn">Share</button>
        <button id="fav" class="btn btn-ghost">★ Save</button>
      </div>
      <div class="packs" id="packs"></div>
      <p class="muted">Install: Share → “Add to Home Screen” (iOS) or browser menu → “Install app” (Android/desktop).
      </p>
    </div>

  </main>
</body>


</html>
